global:
  checkNewVersion: true
  sendAnonymousUsage: false

api:
  dashboard: false

providers:
  docker:
    watch: true
    exposedByDefault: false
  file:
    directory: "/etc/traefik/dynamic"
    watch: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    http:
      middlewares:
        - "security-headers@file"      # shared security headers for every router (dynamic/security-headers.yml)
        # - "cf-only@file"             # OPT-IN: only if behind Cloudflare (dynamic/cloudflare.yml + README)
      tls:
        certResolver: "letsencrypt"

certificatesResolvers:
  letsencrypt:
    acme:
      # NOTE: Traefik does NOT expand ${ENV} in this static config file — set the email literally.
      email: "your_email@example.com"
      storage: "/etc/traefik/acme.json"
      # Default: HTTP-01 — needs inbound port 80 reachable. Fine for a plain public origin.
      httpChallenge:
        entryPoint: web
      # Behind Cloudflare, or locking the origin down? Prefer DNS-01 — it needs no inbound
      # port, so cert renewal can't be broken by a firewall/proxy. Comment out httpChallenge
      # above and use this instead (requires CF_DNS_API_TOKEN in the environment — see
      # docker-compose.yml and README):
      # dnsChallenge:
      #   provider: cloudflare
      #   resolvers:
      #     - "1.1.1.1:53"
      #     - "8.8.8.8:53"

log:
  level: INFO

tls:
  options:
    default:
      minVersion: VersionTLS12
      sniStrict: true
      cipherSuites:
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
