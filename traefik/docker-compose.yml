services:
  traefik:
    image: "traefik:v3.7.7"
    container_name: "traefik"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - web
    ports:
      # Locked to Cloudflare (IPv4-only)? Bind IPv4 explicitly so there's no public IPv6
      # listener to bypass the firewall: "0.0.0.0:80:80" / "0.0.0.0:443:443".
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik.yml:/etc/traefik/traefik.yml:ro"
      - "./dynamic:/etc/traefik/dynamic:ro"
      - "./acme.json:/etc/traefik/acme.json"
    # environment:
    #   # Only needed for the DNS-01 challenge (see traefik.yml). Set CF_DNS_API_TOKEN in .env.
    #   - "CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}"
    labels:
      - "traefik.enable=true"

networks:
  web:
    external: true
