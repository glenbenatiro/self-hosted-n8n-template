# OPT-IN — only for origins that sit behind the Cloudflare proxy (orange cloud).
#
# Defines a `cf-only` middleware that rejects (403) any request whose source IP is not a
# Cloudflare edge range. Because Cloudflare proxies the connection, the source IP Traefik
# sees IS the Cloudflare edge IP, so the default IP strategy is correct here.
#
# To enable: uncomment `- "cf-only@file"` on the websecure entrypoint in traefik.yml, and
# pair it with a cloud-firewall rule that restricts inbound 80/443 to these same ranges
# (see https://github.com/glenbenatiro/vps-hardening §10.8). Do NOT enable this if you are
# not behind Cloudflare — it will 403 all traffic.
#
# Ranges from https://www.cloudflare.com/ips-v4 and /ips-v6 — re-check before relying on them.
http:
  middlewares:
    cf-only:
      ipAllowList:
        sourceRange:
          # IPv4
          - 173.245.48.0/20
          - 103.21.244.0/22
          - 103.22.200.0/22
          - 103.31.4.0/22
          - 141.101.64.0/18
          - 108.162.192.0/18
          - 190.93.240.0/20
          - 188.114.96.0/20
          - 197.234.240.0/22
          - 198.41.128.0/17
          - 162.158.0.0/15
          - 104.16.0.0/13
          - 104.24.0.0/14
          - 172.64.0.0/13
          - 131.0.72.0/22
          # IPv6
          - 2400:cb00::/32
          - 2606:4700::/32
          - 2803:f800::/32
          - 2405:b500::/32
          - 2405:8100::/32
          - 2a06:98c0::/29
          - 2c0f:f248::/32
